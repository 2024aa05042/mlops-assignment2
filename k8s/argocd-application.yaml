apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cats-dogs-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/{{ YOUR_GITHUB_USERNAME }}/{{ YOUR_REPO_NAME }}
    targetRevision: main
    path: k8s
    kustomize:
      images:
        - name: cats-dogs-api
          newName: ghcr.io/{{ YOUR_GITHUB_USERNAME }}/cats-dogs
          newTag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true      # Delete resources not in Git
      selfHeal: true   # Auto-sync when cluster drift detected
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
